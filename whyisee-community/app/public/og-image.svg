<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="55%" stop-color="#0b111d"/>
      <stop offset="100%" stop-color="#152235"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ab4f8"/>
      <stop offset="55%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#f6d365"/>
    </linearGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M 54 0 L 0 0 0 54" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.55 0 0 0 0 0.95 0 0 0 0.45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.9"/>
  <circle cx="1010" cy="120" r="210" fill="#8ab4f8" opacity="0.08"/>
  <circle cx="110" cy="550" r="180" fill="#6ee7b7" opacity="0.07"/>
  <rect x="72" y="68" width="1056" height="494" rx="34" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.11)"/>
  <g filter="url(#glow)">
    <rect x="116" y="118" width="92" height="92" rx="24" fill="rgba(138,180,248,0.12)" stroke="rgba(138,180,248,0.55)" stroke-width="2"/>
    <text x="162" y="178" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="900" fill="#dce8ff">W</text>
  </g>
  <text x="236" y="162" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900" fill="#f4f7fb">whyisee.xyz</text>
  <text x="238" y="214" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#9aa7b8">See ideas. Launch inspiration.</text>
  <text x="118" y="340" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900" fill="#f4f7fb">Indie Building, AI Tools,</text>
  <text x="118" y="408" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900" fill="#f4f7fb">Productivity Workflows</text>
  <rect x="118" y="466" width="250" height="52" rx="26" fill="url(#accent)" opacity="0.95"/>
  <text x="243" y="500" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#09111c">whyisee community</text>
  <text x="392" y="499" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#b7c1d0">Real notes, honest builds, useful resources</text>
</svg>
