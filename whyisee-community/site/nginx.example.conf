server {
    listen 80;
    server_name whyisee.xyz www.whyisee.xyz;

    root /var/www/whyisee.xyz;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|svg|png|jpg|jpeg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
